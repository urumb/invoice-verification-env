name: invoice-verification-env
description: >
  OpenEnv-compatible environment for approving or rejecting employee invoices
  against company policy. An agent receives an invoice observation and must
  return an approve/reject decision with a policy-based reason and confidence.
entrypoint: api.main:app

action_space:
  type: object
  properties:
    stage:
      type: string
      enum:
        - analyze
        - flag_issues
        - final_decision
    action:
      type: string
      minLength: 1
    reasoning:
      type: string
      minLength: 1
    confidence:
      type: number
      minimum: 0
      maximum: 1
  required:
    - stage
    - action
    - reasoning
    - confidence

observation_space:
  type: object
  properties:
    stage:
      type: string
    invoice:
      type: object
    previous_findings:
      type: array
      items:
        type: string
  required:
    - stage
    - invoice
    - previous_findings

reward_range:
  - 0
  - 1
