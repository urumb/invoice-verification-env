name: invoice-verification-env
description: OpenEnv-compatible environment for approving or rejecting invoices against company policy.
action_schema:
  type: object
  properties:
    decision:
      type: string
      enum:
        - approve
        - reject
    reason:
      type: string
    confidence:
      type: number
      minimum: 0
      maximum: 1
  required:
    - decision
    - reason
    - confidence
observation_schema:
  type: object
  properties:
    invoice:
      type: object
  required:
    - invoice
state_schema:
  type: object
  properties:
    step_count:
      type: integer
      minimum: 0
    current_invoice:
      type: object
  required:
    - step_count
    - current_invoice
reward_range:
  - 0
  - 1
