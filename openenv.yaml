name: invoice-verification-env
description: >
  OpenEnv-compatible environment for approving or rejecting employee invoices
  against company policy. An agent receives an invoice observation and must
  return an approve/reject decision with a policy-based reason and confidence.
entrypoint: api.main:app

action_space:
  type: object
  properties:
    decision:
      type: string
      enum:
        - approve
        - reject
    reason:
      type: string
      minLength: 1
    confidence:
      type: number
      minimum: 0
      maximum: 1
  required:
    - decision
    - reason
    - confidence

observation_space:
  type: object
  properties:
    invoice:
      type: object
  required:
    - invoice

reward_range:
  - 0
  - 1
